<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolke Miller RadioTrack — Two-Way Radio Management System</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2ede6;
    --surface: #ffffff;
    --surface2: #f7f3ee;
    --border: #ddd6cc;
    --border2: #c8bfb2;
    --accent: #2d5a27;
    --accent-hover: #234820;
    --accent2: #d4621a;
    --accent2-hover: #b85115;
    --accent3: #2d5a27;
    --text: #1e1e1e;
    --text2: #4a4a4a;
    --text3: #888880;
    --danger: #c0392b;
    --warning: #d4621a;
    --success: #2d5a27;
    --tan: #c9b89a;
    --tan-light: #e8ddd0;
    --green: #2d5a27;
    --orange: #d4621a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  html, body, #root { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  input, select, textarea {
    background: #fff; border: 1px solid var(--border2); color: var(--text);
    font-family: var(--sans); font-size: 13px; padding: 8px 10px; border-radius: 4px;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(45,90,39,0.12); }
  select option { background: #fff; color: var(--text); }
  button { cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
  .btn {
    padding: 8px 16px; border-radius: 4px; font-size: 13px; font-weight: 500;
    border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-secondary { background: #fff; color: var(--text2); border-color: var(--border2); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px;
    font-family: var(--mono); font-weight: 500; letter-spacing: 0.05em;
  }
  table { width: 100%; border-collapse: collapse; }
  th { font-family: var(--mono); font-size: 11px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.08em; padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 600;
    background: var(--surface2); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:hover td { background: #faf7f3; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--surface2);
    display: flex; align-items: center; justify-content: space-between; border-radius: 8px 8px 0 0;
  }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; background: var(--surface2); border-radius: 0 0 8px 8px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; color: var(--text2); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: #fff; border: 1px solid var(--border2); border-radius: 6px;
    padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); color: var(--text);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ─── SUPABASE CONFIG ──────────────────────────────────────────────
const SUPABASE_URL = 'https://yndniceqvedkzjrxtoqt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JT3jSQp5gsxTdNfM30X-6A_Ct3MT3pB';

let _supabase = null;
let _supabaseError = '';
function getSupabase() {
  if (_supabase) return _supabase;
  try {
    const lib = window.supabase || window.supabaseJs;
    if (!lib || !lib.createClient) throw new Error('Supabase library not available — check CDN');
    _supabase = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });
  } catch(e) { _supabaseError = e.message; }
  return _supabase;
}

// ─── CONSTANTS ────────────────────────────────────────────────────
const STATUSES = ['In Service','Assigned','Spare','Out for Repair','Under Repair','Retired','Lost','Missing'];
const DEPARTMENTS = ['Production','Maintenance','Logistics','Quality','Unassigned'];
const REPAIR_STATUSES = ['Reported','Awaiting Shipment','At Vendor','In House Repair','Repaired','Returned to Stock','Scrapped'];
const CONDITIONS = ['Excellent','Good','Fair','Poor','Damaged'];

const STATUS_COLORS = {
  'In Service':    { bg:'#d6ecd4', color:'#1e4a1a', border:'#8fbc8a' },
  'Assigned':      { bg:'#d4e8d4', color:'#2d5a27', border:'#7aaa74' },
  'Spare':         { bg:'#fdebd6', color:'#7a3210', border:'#e8a87a' },
  'Out for Repair':{ bg:'#fce8d6', color:'#7a2e0a', border:'#e8956a' },
  'Under Repair':  { bg:'#fce8d6', color:'#7a2e0a', border:'#e8956a' },
  'Retired':       { bg:'#ebebeb', color:'#666', border:'#ccc' },
  'Lost':          { bg:'#fdd6d6', color:'#7a1a1a', border:'#e89090' },
  'Missing':       { bg:'#fdd6d6', color:'#7a1a1a', border:'#e89090' },
};
const DEPT_COLORS = {
  'Production':  { bg:'#e8d6f5', color:'#4a1a7a', border:'#c0a0e0' },
  'Maintenance': { bg:'#d6e8f5', color:'#1a3a6a', border:'#90b8e0' },
  'Logistics':   { bg:'#d6ecd4', color:'#1e4a1a', border:'#8fbc8a' },
  'Quality':     { bg:'#fff3d6', color:'#7a5a00', border:'#e8c84a' },
  'Unassigned':  { bg:'#ebebeb', color:'#666', border:'#ccc' },
};

function Badge({ val, map }) {
  const s = (map || STATUS_COLORS)[val] || { bg:'#222', color:'#888', border:'#333' };
  return <span className="badge" style={{ background: s.bg, color: s.color, border:`1px solid ${s.border}` }}>{val}</span>;
}

// ─── TOAST ────────────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const color = type === 'error' ? '#c0392b' : type === 'warn' ? '#d4621a' : '#2d5a27';
  return (
    <div className="toast">
      <span style={{ color, fontSize:16 }}>{type==='error'?'✕':type==='warn'?'⚠':'✓'}</span>
      <span>{msg}</span>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [radios, setRadios] = useState([]);
  const [assignments, setAssignments] = useState([]);
  const [repairs, setRepairs] = useState([]);
  const [locations, setLocations] = useState([]);
  const [channels, setChannels] = useState([]);
  const [toast, setToast] = useState(null);

  const notify = (msg, type='success') => setToast({ msg, type });

  const [dbStatus, setDbStatus] = useState('checking');
  const [dbError, setDbError] = useState('');

  // ── Supabase loaders ──
  const loadData = useCallback(async () => {
    const sb = getSupabase();
    if (!sb) {
      setDbStatus('error');
      setDbError(_supabaseError || 'Supabase library not loaded. Check your internet connection and reload.');
      return;
    }
    try {
      const [r, a, rep, loc, ch] = await Promise.all([
        sb.from('radios').select('*').order('radio_id'),
        sb.from('assignment_log').select('*').order('date', { ascending: false }),
        sb.from('repair_log').select('*').order('date_reported', { ascending: false }),
        sb.from('locations').select('*').order('name'),
        sb.from('channels').select('*').order('location').order('channel_number'),
      ]);
      if (r.error) { setDbStatus('error'); setDbError(r.error.message); return; }
      setDbStatus('ok'); setDbError('');
      if (r.data) setRadios(r.data);
      if (a.data) setAssignments(a.data);
      if (rep.data) setRepairs(rep.data);
      if (loc.data) setLocations(loc.data);
      if (ch.data) setChannels(ch.data);
    } catch(e) {
      setDbStatus('error');
      setDbError(e.message || 'Unknown connection error');
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  // ── Radio CRUD ──
  const saveRadio = async (radio) => {
    const sb = getSupabase();
    if (!sb) { notify('Database not connected.', 'error'); return false; }
    if (radio.id) {
      const { error } = await sb.from('radios').update(radio).eq('id', radio.id);
      if (error) { notify(`Save failed: ${error.message}`, 'error'); return false; }
    } else {
      const { id: _drop, ...insertData } = radio;
      const { error } = await sb.from('radios').insert([insertData]);
      if (error) { notify(`Save failed: ${error.message}`, 'error'); return false; }
    }
    await loadData(); notify('Radio saved'); return true;
  };

  const saveAssignment = async (rec) => {
    const sb = getSupabase();
    const { error } = await sb.from('assignment_log').insert([rec]);
    if (error) { notify(error.message, 'error'); return; }
    await sb.from('radios').update({ department: rec.to_department, status: rec.new_status }).eq('serial_number', rec.serial_number);
    loadData(); notify('Assignment logged');
  };

  const saveRepair = async (rec) => {
    const sb = getSupabase();
    if (rec.id) {
      const { error } = await sb.from('repair_log').update(rec).eq('id', rec.id);
      if (error) { notify(error.message, 'error'); return; }
    } else {
      const { error } = await sb.from('repair_log').insert([rec]);
      if (error) { notify(error.message, 'error'); return; }
      await sb.from('radios').update({ repair_needed: true, status: 'Out for Repair' }).eq('serial_number', rec.serial_number);
    }
    loadData(); notify('Repair log saved');
  };

  const deleteRadio = async (id) => {
    const sb = getSupabase();
    const { error } = await sb.from('radios').delete().eq('id', id);
    if (error) { notify(error.message, 'error'); return; }
    loadData(); notify('Radio deleted');
  };

  // ── Location CRUD ──
  const saveLocation = async (name) => {
    const sb = getSupabase();
    const { error } = await sb.from('locations').insert([{ name: name.trim() }]);
    if (error) { notify(error.message, 'error'); return false; }
    await loadData(); notify('Location added'); return true;
  };

  const deleteLocation = async (id) => {
    const sb = getSupabase();
    const { error } = await sb.from('locations').delete().eq('id', id);
    if (error) { notify(error.message, 'error'); return; }
    await loadData(); notify('Location removed');
  };

  // ── Channel CRUD ──
  const saveChannel = async (ch) => {
    const sb = getSupabase();
    if (ch.id) {
      const { id: _d, ...data } = ch;
      const { error } = await sb.from('channels').update(data).eq('id', ch.id);
      if (error) { notify(error.message, 'error'); return false; }
    } else {
      const { id: _d, ...data } = ch;
      const { error } = await sb.from('channels').insert([data]);
      if (error) { notify(error.message, 'error'); return false; }
    }
    await loadData(); notify('Channel saved'); return true;
  };

  const deleteChannel = async (id) => {
    const sb = getSupabase();
    const { error } = await sb.from('channels').delete().eq('id', id);
    if (error) { notify(error.message, 'error'); return; }
    await loadData(); notify('Channel deleted');
  };

  const tabs = [
    { id:'dashboard',  label:'Dashboard',       icon:'◈' },
    { id:'inventory',  label:'Radio Inventory',  icon:'▦' },
    { id:'assignments',label:'Assignment Log',   icon:'⇄' },
    { id:'repairs',    label:'Repair Log',       icon:'⚙' },
    { id:'spares',     label:'Spare Inventory',  icon:'◻' },
    { id:'channels',   label:'Channel Reference',icon:'📡' },
    { id:'settings',   label:'Settings',         icon:'⚙' },
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}>
      {/* Header */}
      <header style={{ background: '#2d5a27', borderBottom:'3px solid #d4621a', padding:'0 24px', display:'flex', alignItems:'center', gap:24, height:54, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <svg height="34" viewBox="0 0 1112 482" xmlns="http://www.w3.org/2000/svg" style={{ fill:'white', display:'block', flexShrink:0 }}>
            <g transform="matrix(1,0,0,1,-551.993,-679.088)">
              <g transform="matrix(1,0,0,1,37.8107,-332.194)">
                <path d="M813.704,1314.27C813.709,1251.5 814.091,1214.31 814.777,1210.05C816.381,1200.08 821.093,1187.43 826.632,1178.24C851.275,1137.33 905.013,1120.67 951.267,1139.61C963.952,1144.8 973.621,1151.47 983.101,1161.58L991.093,1170.09L996.388,1163.64C1006.85,1150.9 1025.14,1139.94 1044.21,1134.98C1052.79,1132.75 1056.81,1132.31 1069.25,1132.22C1085.96,1132.1 1095.17,1133.7 1108.1,1138.97C1138.14,1151.23 1157.58,1173.37 1166.02,1204.95C1167.63,1210.98 1167.82,1220.65 1168.14,1311.72L1168.49,1411.87L1118.32,1411.87L1118.32,1320.08C1118.32,1218.2 1118.48,1220.8 1111.54,1206.24C1101.65,1185.46 1080.26,1175.78 1055.69,1180.97C1037.17,1184.88 1024.74,1197.48 1018.46,1218.71C1016.79,1224.33 1016.62,1232.4 1016.34,1318.35L1016.04,1411.87L966.089,1411.87L965.769,1319.37C965.454,1228.18 965.418,1226.76 963.243,1219.08C957.049,1197.2 945.113,1185.13 925.612,1181.01C916.509,1179.09 908.938,1179.1 900.674,1181.04C891.726,1183.14 885.257,1186.87 878.728,1193.7C872.445,1200.26 868.923,1206.63 865.639,1217.34L863.346,1224.82L862.673,1411.87L813.696,1411.87C813.696,1411.87 813.704,1314.27 813.704,1314.27ZM1311.75,1418.94C1254.4,1411.51 1206.61,1366.82 1194.94,1309.72C1178.98,1231.62 1229.12,1157.07 1306.92,1143.2C1313.43,1142.04 1325.32,1141.4 1347.56,1141.01L1378.99,1140.46L1378.99,1189.66L1370.04,1189.66C1358.06,1189.67 1335.62,1191.41 1324.29,1193.21C1270.74,1201.75 1245.14,1229.97 1245.09,1280.52C1245.04,1328.48 1266.02,1354.92 1312.93,1366.03C1323.89,1368.62 1345.45,1371.1 1357.11,1371.1C1362.23,1371.1 1369.25,1371.39 1372.7,1371.75L1378.99,1372.41L1378.99,1420.03L1348.58,1419.9C1331.85,1419.82 1315.28,1419.39 1311.75,1418.94ZM633.625,1416.9C567.526,1408.73 522.234,1357.86 515.245,1283.95C514.576,1276.88 514.184,1224.39 514.184,1142.01L514.183,1011.28L564.214,1011.28L564.538,1146.09C564.861,1280.85 564.862,1280.89 567.115,1290.69C576.884,1333.18 597.038,1358 629.241,1367.2C640.949,1370.55 663.19,1370.55 675.695,1367.2C722.52,1354.66 749.612,1309.36 741.677,1256.87C               </g>
            </g>
          </svg>
          <span style={{ fontFamily:'var(--mono)', fontWeight:600, fontSize:15, letterSpacing:'0.05em', color:'#fff' }}>BOLKE MILLER RADIOTRACK</span>
          <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'rgba(255,255,255,0.5)', marginLeft:2 }}>v1.0</span>
        </div>
        <nav style={{ display:'flex', gap:2, flex:1 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ background: tab===t.id ? 'rgba(255,255,255,0.15)' : 'transparent',
                border: 'none', color: tab===t.id ? '#fff' : 'rgba(255,255,255,0.7)',
                padding:'6px 14px', borderRadius:4, fontFamily:'var(--sans)', fontSize:13,
                fontWeight: tab===t.id ? 600 : 400, display:'flex', alignItems:'center', gap:6,
                borderBottom: tab===t.id ? '2px solid #d4621a' : '2px solid transparent' }}>
              <span style={{ fontSize:11 }}>{t.icon}</span>{t.label}
            </button>
          ))}
        </nav>
      </header>

      {/* DB status banner */}
      {dbStatus === 'error' && (
        <div style={{ background:'#fdf2f2', borderBottom:'2px solid #c0392b', padding:'10px 24px', fontSize:13, color:'#7a1a1a', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom: dbError ? 4 : 0 }}>
            <span style={{ fontWeight:600 }}>⚠ Database connection failed.</span>
            <span>Check your <code style={{ fontFamily:'var(--mono)', background:'#fce4e4', padding:'1px 5px', borderRadius:3 }}>SUPABASE_URL</code> and <code style={{ fontFamily:'var(--mono)', background:'#fce4e4', padding:'1px 5px', borderRadius:3 }}>SUPABASE_ANON_KEY</code> at the top of index.html</span>
          </div>
          {dbError && (
            <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'#c0392b', background:'#fce4e4', padding:'6px 10px', borderRadius:3, marginTop:4 }}>
              Error: {dbError}
            </div>
          )}
        </div>
      )}
      {/* Body */}
      <main style={{ flex:1, overflow:'auto', padding:24 }}>
        {tab === 'dashboard'   && <Dashboard radios={radios} assignments={assignments} repairs={repairs} locations={locations} onEditRadio={saveRadio} onDeleteRadio={deleteRadio} />}
        {tab === 'inventory'   && <Inventory radios={radios} locations={locations} onSave={saveRadio} onDelete={deleteRadio} notify={notify} />}
        {tab === 'assignments' && <Assignments assignments={assignments} radios={radios} onSave={saveAssignment} notify={notify} />}
        {tab === 'repairs'     && <Repairs repairs={repairs} radios={radios} onSave={saveRepair} notify={notify} />}
        {tab === 'spares'      && <Spares radios={radios} onSave={saveRadio} notify={notify} />}
        {tab === 'channels'    && <Channels channels={channels} locations={locations} onSave={saveChannel} onDelete={deleteChannel} notify={notify} />}
        {tab === 'settings'    && <Settings locations={locations} onSaveLocation={saveLocation} onDeleteLocation={deleteLocation} notify={notify} />}
      </main>

      {/* Modals */}
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────
function Dashboard({ radios, assignments, repairs, locations, onEditRadio, onDeleteRadio }) {
  // activeFilter: { label, list, color } or null
  const [activeFilter, setActiveFilter] = useState(null);
  const [editingRadio, setEditingRadio] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const total = radios.length;
  const byDept = DEPARTMENTS.reduce((a,d) => ({ ...a, [d]: radios.filter(r=>r.department===d).length }), {});
  const inRepairList = radios.filter(r=>['Out for Repair','Under Repair'].includes(r.status));
  const spareList = radios.filter(r=>r.is_spare || r.status==='Spare');
  const missingList = radios.filter(r=>['Lost','Missing'].includes(r.status));
  const repairNeeded = radios.filter(r=>r.repair_needed).length;
  const openRepairs = repairs.filter(r=>!['Repaired','Returned to Stock','Scrapped'].includes(r.repair_status));
  const oldest = [...openRepairs].sort((a,b)=>new Date(a.date_reported)-new Date(b.date_reported))[0];
  const now = new Date();
  const thisMonth = repairs.filter(r => {
    const d = new Date(r.date_reported);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });

  const setFilter = (label, list, color) => {
    if (activeFilter && activeFilter.label === label) { setActiveFilter(null); return; }
    setActiveFilter({ label, list, color });
  };

  // ── Reusable filtered radio table ──
  const FilteredTable = () => {
    if (!activeFilter) return null;
    const { label, list, color } = activeFilter;
    return (
      <div style={{ background:'var(--surface)', border:`2px solid ${color}`, borderRadius:6, marginBottom:20, overflow:'hidden' }}>
        <div style={{ padding:'12px 16px', borderBottom:'1px solid var(--border)', background:'var(--surface2)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontFamily:'var(--mono)', fontSize:12, fontWeight:600, color, textTransform:'uppercase', letterSpacing:'0.06em' }}>
            {label} — {list.length} radio{list.length!==1?'s':''}
          </span>
          <button className="btn btn-secondary btn-sm" onClick={() => setActiveFilter(null)}>✕ Close</button>
        </div>
        {list.length === 0 ? (
          <div style={{ padding:32, textAlign:'center', color:'var(--text3)', fontSize:13 }}>No radios in this category.</div>
        ) : (
          <div style={{ overflowX:'auto' }}>
            <table>
              <thead>
                <tr>{['Radio ID','Serial Number','Make / Model','Department','Status','Condition','Actions'].map(h=><th key={h}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {list.map(r => (
                  <tr key={r.id}>
                    <td><span style={{ fontFamily:'var(--mono)', color:'var(--green)', fontSize:12 }}>{r.radio_id}</span></td>
                    <td><span style={{ fontFamily:'var(--mono)', fontSize:12 }}>{r.serial_number}</span></td>
                    <td style={{ color:'var(--text2)' }}>{r.make} {r.model}</td>
                    <td><Badge val={r.department} map={DEPT_COLORS} /></td>
                    <td><Badge val={r.status} map={STATUS_COLORS} /></td>
                    <td style={{ color:'var(--text2)', fontSize:12 }}>{r.condition||'—'}</td>
                    <td>
                      <div style={{ display:'flex', gap:6 }}>
                        <button className="btn btn-secondary btn-sm" onClick={() => setEditingRadio(r)}>Edit</button>
                        <button className="btn btn-sm" onClick={() => setConfirmDelete(r)}
                          style={{ background:'transparent', color:'var(--danger)', border:'1px solid var(--danger)', borderRadius:4, fontSize:12, padding:'5px 10px' }}>
                          Delete
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  };

  // ── Top summary cards ──
  const SummaryCard = ({ label, value, sub, color, list }) => {
    const isActive = activeFilter?.label === label;
    return (
      <div onClick={() => setFilter(label, list, color)}
        style={{ background: isActive ? color : 'var(--surface)',
          border:`2px solid ${isActive ? color : 'var(--border)'}`,
          borderRadius:6, padding:'16px 20px', borderLeft:`4px solid ${color}`,
          cursor:'pointer', transition:'all 0.15s',
          boxShadow: isActive ? `0 2px 12px ${color}33` : 'none' }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:11, color: isActive ? 'rgba(255,255,255,0.8)' : 'var(--text3)', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.07em' }}>{label}</div>
        <div style={{ fontFamily:'var(--mono)', fontSize:28, fontWeight:600, color: isActive ? '#fff' : color }}>{value}</div>
        {sub && <div style={{ fontSize:11, color: isActive ? 'rgba(255,255,255,0.7)' : 'var(--text3)', marginTop:4 }}>{sub}</div>}
        <div style={{ fontSize:11, color: isActive ? 'rgba(255,255,255,0.65)' : 'var(--text3)', marginTop:6, fontFamily:'var(--mono)' }}>
          {isActive ? '▲ hide list' : '▼ view list'}
        </div>
      </div>
    );
  };

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--text3)', marginBottom:4 }}>SYSTEM OVERVIEW</div>
        <h2 style={{ fontSize:20, fontWeight:500, color:'var(--text)' }}>Dashboard</h2>
      </div>

      {/* Top summary cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:16 }}>
        <SummaryCard label="All Radios"    value={total}               sub="All assets tracked"             color="var(--green)"  list={radios} />
        <SummaryCard label="In Repair"     value={inRepairList.length} sub={`${repairNeeded} flagged repair needed`} color="var(--orange)" list={inRepairList} />
        <SummaryCard label="Spare Units"   value={spareList.length}    sub="Ready to deploy"                color="#8a6a3a"       list={spareList} />
        <SummaryCard label="Lost/Missing"  value={missingList.length}  sub="Requires investigation"         color="var(--danger)" list={missingList} />
      </div>

      {/* Filtered list (shared by all clickable elements) */}
      <FilteredTable />

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>

        {/* By Department — each row clickable */}
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:20 }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text3)', marginBottom:4, textTransform:'uppercase', letterSpacing:'0.07em' }}>Radios by Department</div>
          <div style={{ fontSize:11, color:'var(--text3)', marginBottom:14 }}>Click a department to view its radios</div>
          {DEPARTMENTS.map(d => {
            const list = radios.filter(r=>r.department===d);
            const count = list.length;
            const pct = total > 0 ? (count/total*100) : 0;
            const c = DEPT_COLORS[d];
            const isActive = activeFilter?.label === d;
            return (
              <div key={d} onClick={() => setFilter(d, list, c.color)}
                style={{ marginBottom:10, padding:'8px 10px', borderRadius:5, cursor:'pointer',
                  background: isActive ? c.bg : 'transparent',
                  border: `1px solid ${isActive ? c.border : 'transparent'}`,
                  transition:'all 0.12s' }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                  <span style={{ fontSize:13, color: isActive ? c.color : 'var(--text2)', fontWeight: isActive ? 600 : 400 }}>{d}</span>
                  <span style={{ fontFamily:'var(--mono)', fontSize:13, color: c.color }}>{count} {isActive ? '▲' : '▼'}</span>
                </div>
                <div style={{ background:'var(--border)', borderRadius:2, height:5 }}>
                  <div style={{ background: c.color, width:`${pct}%`, height:'100%', borderRadius:2, transition:'width 0.3s' }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* Status Breakdown — each row clickable */}
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:20 }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text3)', marginBottom:4, textTransform:'uppercase', letterSpacing:'0.07em' }}>Status Breakdown</div>
          <div style={{ fontSize:11, color:'var(--text3)', marginBottom:14 }}>Click a status to view those radios</div>
          {STATUSES.map(s => {
            const list = radios.filter(r=>r.status===s);
            const count = list.length;
            if (!count) return null;
            const c = STATUS_COLORS[s] || { color:'#888', bg:'#eee', border:'#ccc' };
            const isActive = activeFilter?.label === s;
            return (
              <div key={s} onClick={() => setFilter(s, list, c.color)}
                style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                  padding:'8px 10px', borderRadius:5, cursor:'pointer',
                  background: isActive ? c.bg : 'transparent',
                  border: `1px solid ${isActive ? c.border : 'transparent'}`,
                  marginBottom:2, transition:'all 0.12s' }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <Badge val={s} map={STATUS_COLORS} />
                  {isActive && <span style={{ fontSize:11, color: c.color, fontFamily:'var(--mono)' }}>▲</span>}
                </div>
                <span style={{ fontFamily:'var(--mono)', fontSize:13, color:'var(--text)', fontWeight: isActive ? 600 : 400 }}>{count}</span>
              </div>
            );
          })}
        </div>

        {/* Repair Summary */}
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:20 }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text3)', marginBottom:16, textTransform:'uppercase', letterSpacing:'0.07em' }}>Repair Summary</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {[
              { l:'Open Repairs',  v:openRepairs.length,   c:'var(--orange)' },
              { l:'This Month',    v:thisMonth.length,      c:'var(--text)' },
              { l:'Oldest Open',   v: oldest ? `${Math.floor((Date.now()-new Date(oldest.date_reported))/(1000*60*60*24))}d` : '—', c:'var(--danger)' },
              { l:'Repair Needed', v:repairNeeded,          c:'#8a6a3a' },
            ].map(i => (
              <div key={i.l} style={{ background:'var(--surface2)', borderRadius:4, padding:'12px 14px', border:'1px solid var(--border)' }}>
                <div style={{ fontSize:11, color:'var(--text3)', marginBottom:4 }}>{i.l}</div>
                <div style={{ fontFamily:'var(--mono)', fontSize:20, fontWeight:600, color:i.c }}>{i.v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Recent Assignments */}
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:20 }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text3)', marginBottom:16, textTransform:'uppercase', letterSpacing:'0.07em' }}>Recent Assignments</div>
          {assignments.slice(0,5).map(a => (
            <div key={a.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom:'1px solid var(--border)' }}>
              <div>
                <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--green)' }}>{a.serial_number}</div>
                <div style={{ fontSize:11, color:'var(--text3)' }}>{a.from_department} → {a.to_department}</div>
              </div>
              <div style={{ fontSize:11, color:'var(--text3)' }}>{a.date}</div>
            </div>
          ))}
          {assignments.length === 0 && <div style={{ color:'var(--text3)', fontSize:13 }}>No assignments logged yet.</div>}
        </div>
      </div>

      {/* Edit modal */}
      {editingRadio && (
        <RadioForm radio={editingRadio} radios={radios} locations={locations}
          onSave={async r => { const ok = await onEditRadio(r); if (ok) setEditingRadio(null); }}
          onClose={() => setEditingRadio(null)} />
      )}

      {/* Delete confirmation modal */}
      {confirmDelete && (
        <div className="modal-overlay" onClick={e=>e.stopPropagation()}>
          <div className="modal" style={{ maxWidth:420 }}>
            <div className="modal-header">
              <span style={{ fontFamily:'var(--mono)', fontWeight:600, color:'var(--danger)' }}>⚠ Confirm Delete</span>
            </div>
            <div className="modal-body">
              <p style={{ fontSize:14, color:'var(--text)', marginBottom:8 }}>
                Are you sure you want to permanently delete this radio?
              </p>
              <div style={{ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:4, padding:'12px 14px', marginTop:12 }}>
                <div style={{ fontFamily:'var(--mono)', fontSize:13, color:'var(--green)', marginBottom:4 }}>{confirmDelete.radio_id} — {confirmDelete.serial_number}</div>
                <div style={{ fontSize:12, color:'var(--text2)' }}>{confirmDelete.make} {confirmDelete.model} · {confirmDelete.department} · {confirmDelete.status}</div>
              </div>
              <p style={{ fontSize:12, color:'var(--text3)', marginTop:12 }}>This action cannot be undone.</p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-sm" onClick={async () => { await onDeleteRadio(confirmDelete.id); setConfirmDelete(null); setActiveFilter(null); }}
                style={{ background:'var(--danger)', color:'#fff', border:'1px solid var(--danger)', borderRadius:4, fontSize:13, padding:'8px 16px', fontWeight:500 }}>
                Yes, Delete Radio
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── INVENTORY ────────────────────────────────────────────────────
function Inventory({ radios, locations, onSave, onDelete, notify }) {
  const [search, setSearch] = useState('');
  const [filterDept, setFilterDept] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const filtered = useMemo(() => radios.filter(r =>
    (!search || r.serial_number?.toLowerCase().includes(search.toLowerCase()) || r.radio_id?.toLowerCase().includes(search.toLowerCase()) || r.make?.toLowerCase().includes(search.toLowerCase()) || r.model?.toLowerCase().includes(search.toLowerCase())) &&
    (!filterDept || r.department === filterDept) &&
    (!filterStatus || r.status === filterStatus)
  ), [radios, search, filterDept, filterStatus]);

  const openNew = () => { setEditing(null); setShowForm(true); };
  const openEdit = (r) => { setEditing(r); setShowForm(true); };
  const handleDelete = async (r) => {
    await onDelete(r.id);
    setConfirmDelete(null);
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div>
          <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--text3)', marginBottom:4 }}>MASTER ASSET LIST</div>
          <h2 style={{ fontSize:20, fontWeight:500 }}>Radio Inventory <span style={{ fontFamily:'var(--mono)', fontSize:14, color:'var(--text3)', fontWeight:400 }}>({filtered.length})</span></h2>
        </div>
        <button className="btn btn-primary" onClick={openNew}>+ Add Radio</button>
      </div>
      <div style={{ display:'flex', gap:10, marginBottom:16 }}>
        <input placeholder="Search serial, ID, make, model…" value={search} onChange={e=>setSearch(e.target.value)} style={{ flex:1 }} />
        <select value={filterDept} onChange={e=>setFilterDept(e.target.value)}>
          <option value="">All Departments</option>
          {DEPARTMENTS.map(d=><option key={d}>{d}</option>)}
        </select>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="">All Statuses</option>
          {STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, overflow:'hidden' }}>
        <div style={{ overflowX:'auto' }}>
          <table>
            <thead>
              <tr>
                {['Radio ID','Serial Number','Make / Model','Department','Status','Condition','Spare?','Repair?','Actions'].map(h=><th key={h}>{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {filtered.map(r => (
                <tr key={r.id}>
                  <td><span style={{ fontFamily:'var(--mono)', color:'var(--green)', fontSize:12 }}>{r.radio_id}</span></td>
                  <td><span style={{ fontFamily:'var(--mono)', fontSize:12 }}>{r.serial_number}</span></td>
                  <td><span style={{ color:'var(--text2)' }}>{r.make} {r.model}</span></td>
                  <td><Badge val={r.department} map={DEPT_COLORS} /></td>
                  <td><Badge val={r.status} map={STATUS_COLORS} /></td>
                  <td style={{ color:'var(--text2)', fontSize:12 }}>{r.condition || '—'}</td>
                  <td style={{ textAlign:'center' }}>
                    {r.is_spare ? <span style={{ color:'var(--orange)' }}>●</span> : <span style={{ color:'#aaa' }}>○</span>}
                  </td>
                  <td style={{ textAlign:'center' }}>
                    {r.repair_needed ? <span style={{ color:'var(--danger)' }}>●</span> : <span style={{ color:'#aaa' }}>○</span>}
                  </td>
                  <td>
                    <div style={{ display:'flex', gap:6 }}>
                      <button className="btn btn-secondary btn-sm" onClick={() => openEdit(r)}>Edit</button>
                      <button className="btn btn-sm" onClick={() => setConfirmDelete(r)}
                        style={{ background:'transparent', color:'var(--danger)', border:'1px solid var(--danger)', borderRadius:4, fontSize:12, padding:'5px 10px' }}>
                        Delete
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length === 0 && (
                <tr><td colSpan={9} style={{ textAlign:'center', color:'var(--text3)', padding:40 }}>No radios found</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
      {showForm && <RadioForm radio={editing} radios={radios} locations={locations} onSave={async (r) => { const ok = await onSave(r); if (ok) setShowForm(false); }} onClose={() => setShowForm(false)} />}

      {/* Delete confirmation modal */}
      {confirmDelete && (
        <div className="modal-overlay" onClick={e=>e.stopPropagation()}>
          <div className="modal" style={{ maxWidth:420 }}>
            <div className="modal-header">
              <span style={{ fontFamily:'var(--mono)', fontWeight:600, color:'var(--danger)' }}>⚠ Confirm Delete</span>
            </div>
            <div className="modal-body">
              <p style={{ fontSize:14, color:'var(--text)', marginBottom:8 }}>
                Are you sure you want to permanently delete this radio?
              </p>
              <div style={{ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:4, padding:'12px 14px', marginTop:12 }}>
                <div style={{ fontFamily:'var(--mono)', fontSize:13, color:'var(--green)', marginBottom:4 }}>{confirmDelete.radio_id} — {confirmDelete.serial_number}</div>
                <div style={{ fontSize:12, color:'var(--text2)' }}>{confirmDelete.make} {confirmDelete.model} · {confirmDelete.department} · {confirmDelete.status}</div>
              </div>
              <p style={{ fontSize:12, color:'var(--text3)', marginTop:12 }}>This action cannot be undone. The radio will be removed from the database permanently.</p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-sm" onClick={() => handleDelete(confirmDelete)}
                style={{ background:'var(--danger)', color:'#fff', border:'1px solid var(--danger)', borderRadius:4, fontSize:13, padding:'8px 16px', fontWeight:500 }}>
                Yes, Delete Radio
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RadioForm({ radio, radios, locations, onSave, onClose }) {
  const nextId = () => {
    const nums = radios.map(r => parseInt((r.radio_id||'').replace(/\D/g,''))||0);
    return `RD-${String(Math.max(0,...nums)+1).padStart(3,'0')}`;
  };
  const [form, setForm] = useState(radio || {
    radio_id: nextId(), serial_number:'', make:'', model:'', department:'Unassigned',
    status:'Spare', location_id:'', purchase_date:'', warranty_expiration:'',
    condition:'Good', is_spare:false, repair_needed:false, last_service_date:'', notes:''
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSave = () => {
    if (!form.serial_number) { alert('Serial number required'); return; }
    onSave(form);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.stopPropagation()}>
      <div className="modal">
        <div className="modal-header">
          <span style={{ fontFamily:'var(--mono)', fontWeight:600 }}>{radio ? 'Edit Radio' : 'Add New Radio'}</span>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group"><label>Radio ID</label><input value={form.radio_id} onChange={e=>set('radio_id',e.target.value)} /></div>
            <div className="form-group"><label>Serial Number *</label><input value={form.serial_number} onChange={e=>set('serial_number',e.target.value)} /></div>
            <div className="form-group"><label>Make</label><input value={form.make} onChange={e=>set('make',e.target.value)} /></div>
            <div className="form-group"><label>Model</label><input value={form.model} onChange={e=>set('model',e.target.value)} /></div>
            <div className="form-group"><label>Department</label><select value={form.department} onChange={e=>set('department',e.target.value)}>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select></div>
            <div className="form-group"><label>Status</label><select value={form.status} onChange={e=>set('status',e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="form-group"><label>Location</label>
              <select value={form.location_id||''} onChange={e=>set('location_id',e.target.value)}>
                <option value="">— None —</option>
                {(locations||[]).map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Condition</label><select value={form.condition} onChange={e=>set('condition',e.target.value)}>{CONDITIONS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="form-group"><label>Purchase Date</label><input type="date" value={form.purchase_date||''} onChange={e=>set('purchase_date',e.target.value)} /></div>
            <div className="form-group"><label>Warranty Expiration</label><input type="date" value={form.warranty_expiration||''} onChange={e=>set('warranty_expiration',e.target.value)} /></div>
            <div className="form-group"><label>Last Service Date</label><input type="date" value={form.last_service_date||''} onChange={e=>set('last_service_date',e.target.value)} /></div>
            <div className="form-group" style={{ flexDirection:'row', alignItems:'center', gap:10 }}>
              <input type="checkbox" checked={!!form.is_spare} onChange={e=>set('is_spare',e.target.checked)} id="is_spare" />

// ─── ASSIGNMENTS ──────────────────────────────────────────────────
function Assignments({ assignments, radios, onSave, notify }) {
  const [showForm, setShowForm] = useState(false);
  const [search, setSearch] = useState('');

  const filtered = useMemo(() => assignments.filter(a =>
    !search || a.serial_number?.toLowerCase().includes(search.toLowerCase()) || a.transaction_id?.toLowerCase().includes(search.toLowerCase())
  ), [assignments, search]);

  const nextTxn = () => {
    const nums = assignments.map(a=>parseInt((a.transaction_id||'').replace(/\D/g,''))||0);
    return `TXN-${String(Math.max(0,...nums)+1).padStart(3,'0')}`;
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div>
          <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--text3)', marginBottom:4 }}>MOVEMENT HISTORY</div>
          <h2 style={{ fontSize:20, fontWeight:500 }}>Assignment Log <span style={{ fontFamily:'var(--mono)', fontSize:14, color:'var(--text3)', fontWeight:400 }}>({filtered.length})</span></h2>
        </div>
        <button className="btn btn-primary" onClick={() => setShowForm(true)}>+ Log Assignment</button>
      </div>
      <div style={{ marginBottom:16 }}>
        <input placeholder="Search serial number, transaction ID…" value={search} onChange={e=>setSearch(e.target.value)} style={{ width:320 }} />
      </div>
      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, overflow:'hidden' }}>
        <table>
          <thead>
            <tr>
              {['Txn ID','Date','Serial Number','From','To','Prev Status','New Status','Reason','Approved By'].map(h=><th key={h}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {filtered.map(a => (
              <tr key={a.id}>
                <td><span style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--green)' }}>{a.transaction_id}</span></td>
                <td style={{ fontSize:12, color:'var(--text2)' }}>{a.date}</td>
                <td><span style={{ fontFamily:'var(--mono)', fontSize:12 }}>{a.serial_number}</span></td>
                <td><Badge val={a.from_department} map={DEPT_COLORS} /></td>
                <td><Badge val={a.to_department} map={DEPT_COLORS} /></td>
                <td><Badge val={a.prev_status} map={STATUS_COLORS} /></td>
                <td><Badge val={a.new_status} map={STATUS_COLORS} /></td>
                <td style={{ fontSize:12, color:'var(--text2)', maxWidth:200 }}>{a.reason}</td>
                <td style={{ fontSize:12, color:'var(--text2)' }}>{a.approved_by}</td>
              </tr>
            ))}
            {filtered.length === 0 && <tr><td colSpan={9} style={{ textAlign:'center', color:'var(--text3)', padding:40 }}>No assignments logged yet</td></tr>}
          </tbody>
        </table>
      </div>
      {showForm && <AssignmentForm radios={radios} nextTxn={nextTxn()} onSave={async r=>{ await onSave(r); setShowForm(false); }} onClose={()=>setShowForm(false)} />}
    </div>
  );

// ─── CHANNELS ─────────────────────────────────────────────────────
function Channels({ channels, locations, onSave, onDelete, notify }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filterLoc, setFilterLoc] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null);

  const locationNames = useMemo(() => {
    const map = {};
    (locations||[]).forEach(l => { map[l.id] = l.name; });
    return map;
  }, [locations]);

  const filtered = useMemo(() => {
    if (!filterLoc) return channels;
    return channels.filter(c => c.location === filterLoc);
  }, [channels, filterLoc]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(c => {
      const loc = c.location || 'Unknown';
      if (!g[loc]) g[loc] = [];
      g[loc].push(c);
    });
    return g;
  }, [filtered]);

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>

          {(locations||[]).map(l=><option key={l.id} value={l.name}>{l.name}</option>)}

        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:40, textAlign:'center', color:'var(--text3)' }}>

                    <td><span style={{ fontFamily:'var(--mono)', fontSize:12 }}>{c.tx_freq}</span></td>
                    <td><span style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--text2)' }}>{c.tx_ctcss||'—'}</span></td>
                    <td style={{ fontSize:12, color:'var(--text2)' }}>{c.user_group||'—'}</td>
                    <td style={{ fontSize:12, color:'var(--text3)' }}>{c.notes||'—'}</td>
                    <td>
                      <div style={{ display:'flex', gap:6 }}>
                        <button className="btn btn-secondary btn-sm" onClick={() => { setEditing(c); setShowForm(true); }}>Edit</button>
                        <button className="btn btn-sm" onClick={() => setConfirmDelete(c)}
                          style={{ background:'transparent', color:'var(--danger)', border:'1px solid var(--danger)', borderRadius:4, fontSize:12, padding:'5px 10px' }}>
                          Delete
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}

      {showForm && (
        <ChannelForm channel={editing} locations={locations}
          onSave={async c => { const ok = await onSave(c); if (ok) setShowForm(false); }}
          onClose={() => setShowForm(false)} />
      )}

      {confirmDelete && (
        <div className="modal-overlay" onClick={e=>e.stopPropagation()}>
          <div className="modal" style={{ maxWidth:400 }}>
            <div className="modal-header">
              <span style={{ fontFamily:'var(--mono)', fontWeight:600, color:'var(--danger)' }}>⚠ Confirm Delete</span>
            </div>
            <div className="modal-body">
              <p style={{ fontSize:14, color:'var(--text)' }}>Delete <strong>{confirmDelete.channel_number}</strong> from <strong>{confirmDelete.location}</strong>? This cannot be undone.</p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-sm" onClick={async () => { await onDelete(confirmDelete.id); setConfirmDelete(null); }}
                style={{ background:'var(--danger)', color:'#fff', border:'none', borderRadius:4, fontSize:13, padding:'8px 16px', fontWeight:500 }}>
                Yes, Delete
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ChannelForm({ channel, locations, onSave, onClose }) {
  const [form, setForm] = useState(channel || {
    location:'', channel_number:'', rx_freq:'', rx_ctcss:'', tx_freq:'', tx_ctcss:'', user_group:'', notes:''
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  return (
    <div className="modal-overlay" onClick={e=>e.stopPropagation()}>
      <div className="modal" style={{ maxWidth:580 }}>
        <div className="modal-header">
          <span style={{ fontFamily:'var(--mono)', fontWeight:600 }}>{channel ? 'Edit Channel' : 'Add Channel'}</span>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group">
              <label>Location *</label>
              <select value={form.location||''} onChange={e=>set('location',e.target.value)}>
                <option value="">— Select location —</option>
                {(locations||[]).map(l=><option key={l.id} value={l.name}>{l.name}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Channel *</label><input placeholder="CH 1" value={form.channel_number||''} onChange={e=>set('channel_number',e.target.value)} /></div>
            <div className="form-group"><label>RX Frequency</label><input placeholder="463.22500" value={form.rx_freq||''} onChange={e=>set('rx_freq',e.target.value)} /></div>
            <div className="form-group"><label>RX CTCSS / CDCSS</label><input placeholder="D306" value={form.rx_ctcss||''} onChange={e=>set('rx_ctcss',e.target.value)} /></div>
            <div className="form-group"><label>TX Frequency</label><input placeholder="463.22500" value={form.tx_freq||''} onChange={e=>set('tx_freq',e.target.value)} /></div>
            <div className="form-group"><label>TX CTCSS / CDCSS</label><input placeholder="D306" value={form.tx_ctcss||''} onChange={e=>set('tx_ctcss',e.target.value)} /></div>
            <div className="form-group"><label>User Group</label><input placeholder="Production" value={form.user_group||''} onChange={e=>set('user_group',e.target.value)} /></div>
            <div className="form-group"><label>Notes</label><input value={form.notes||''} onChange={e=>set('notes',e.target.value)} /></div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => {
            if (!form.location || !form.channel_number) { alert('Location and Channel are required'); return; }
            onSave(form);
          }}>Save Channel</button>
        </div>
      </div>
    </div>
  );
}

// ─── SETTINGS ─────────────────────────────────────────────────────
function Settings({ locations, onSaveLocation, onDeleteLocation, notify }) {
  const [newLoc, setNewLoc] = useState('');
  const [saving, setSaving] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const handleAdd = async () => {
    if (!newLoc.trim()) return;
    if ((locations||[]).find(l => l.name.toLowerCase() === newLoc.trim().toLowerCase())) {
      notify('A location with that name already exists.', 'warn'); return;
    }
    setSaving(true);
    await onSaveLocation(newLoc.trim());
    setNewLoc('');
    setSaving(false);
  };

  return (
    <div style={{ maxWidth:600 }}>
      <div style={{ marginBottom:24 }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--text3)', marginBottom:4 }}>CONFIGURATION</div>
        <h2 style={{ fontSize:20, fontWeight:500 }}>Settings</h2>
      </div>

      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, overflow:'hidden', marginBottom:24 }}>
        <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)', background:'var(--surface2)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <span style={{ fontFamily:'var(--mono)', fontSize:12, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', color:'var(--text3)' }}>
            Locations
          </span>
          <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text3)' }}>{(locations||[]).length} location{(locations||[]).length!==1?'s':''}</span>
        </div>

        {(locations||[]).length === 0 && (
          <div style={{ padding:24, color:'var(--text3)', fontSize:13 }}>No locations added yet.</div>
        )}

        {(locations||[]).map(l => (
          <div key={l.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 20px', borderBottom:'1px solid var(--border)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ color:'var(--green)', fontSize:16 }}>📍</span>
              <span style={{ fontWeight:500 }}>{l.name}</span>
            </div>
            <button className="btn btn-sm" onClick={() => setConfirmDelete(l)}
              style={{ background:'transparent', color:'var(--danger)', border:'1px solid var(--danger)', borderRadius:4, fontSize:12, padding:'4px 10px' }}>
              Remove
            </button>
          </div>
        ))}

        <div style={{ padding:'14px 20px', background:'var(--surface2)', display:'flex', gap:10, alignItems:'center' }}>
          <input
            placeholder="New location name (e.g. BMC4)"
            value={newLoc}
            onChange={e=>setNewLoc(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleAdd()}
            style={{ flex:1 }}
          />
          <button className="btn btn-primary" onClick={handleAdd} disabled={saving || !newLoc.trim()}>
            {saving ? 'Adding…' : '+ Add Location'}
          </button>
        </div>
      </div>

      {confirmDelete && (
        <div className="modal-overlay" onClick={e=>e.stopPropagation()}>
          <div className="modal" style={{ maxWidth:400 }}>
            <div className="modal-header">
              <span style={{ fontFamily:'var(--mono)', fontWeight:600, color:'var(--danger)' }}>⚠ Remove Location</span>
            </div>
            <div className="modal-body">
              <p style={{ fontSize:14, color:'var(--text)' }}>
                Remove <strong>{confirmDelete.name}</strong>? This will not delete radios assigned to this location, but the location will no longer appear in dropdown menus.
              </p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-sm" onClick={async () => { await onDeleteLocation(confirmDelete.id); setConfirmDelete(null); }}
                style={{ background:'var(--danger)', color:'#fff', border:'none', borderRadius:4, fontSize:13, padding:'8px 16px', fontWeight:500 }}>
                Yes, Remove
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── RENDER ───────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
